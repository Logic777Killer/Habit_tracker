<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер привычек</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="container">
    <header>
        <h1>🌱 Трекер привычек</h1>
        <nav id="authNav" class="hidden">
            <span id="userNameDisplay">Пользователь</span>
            <a href="quotes.html" class="btn-outline" style="width:auto;padding:8px 12px;text-decoration:none">💬</a>
            <a href="stats.html" class="btn-outline" style="width:auto;padding:8px 12px;text-decoration:none">📊</a>
            <button id="logoutBtn" class="btn-outline">Выйти</button>
        </nav>
    </header>

    <main>
        <section id="authSection" class="auth-card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <form id="loginForm" class="auth-form">
                <h2>Вход в аккаунт</h2>
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <p class="error-msg" id="loginError"></p>
                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <h2>Создать аккаунт</h2>
                <div class="form-group">
                    <label for="regUsername">Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="User123" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                <p class="error-msg" id="regError"></p>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
        </section>

        <section id="appSection" class="app-card hidden">
            <div class="app-header">
                <h2>Мои привычки</h2>
                <button id="addHabitBtn" class="btn-primary">+ Добавить</button>
            </div>
            <div id="habitsList" class="habits-grid">
                <p class="placeholder">Здесь будут твои привычки</p>
            </div>
        </section>
    </main>
</div>

<script src="js/main.js?v=2"></script>
<script src="js/calendar.js?v=2"></script>

<!-- Модальное окно календаря -->
<div id="calendarModal" class="modal hidden">
    <div class="modal-content calendar-modal">
        <div class="modal-header">
            <h3 id="calendarTitle">Календарь</h3>
            <button class="modal-close" id="closeCalendar">&times;</button>
        </div>
        <div class="calendar-nav">
            <button id="prevMonth">◀</button>
            <span id="monthYear"></span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="calendar-legend">
            <span class="dot completed"></span> Выполнено
            <span class="dot empty"></span> Пропущено
        </div>
    </div>
</div>

<!-- Модальное окно добавления привычки -->
<div id="addHabitModal" class="modal hidden">
    <div class="modal-content" style="max-width:400px">
        <div class="modal-header">
            <h3>✨ Новая привычка</h3>
            <button class="modal-close" id="closeAddHabit">&times;</button>
        </div>
        <form id="addHabitForm">
            <div class="form-group">
                <label for="habitTitle">Название *</label>
                <input type="text" id="habitTitle" placeholder="Например: Пить воду" required>
            </div>
            <div class="form-group">
                <label for="habitDesc">Описание</label>
                <input type="text" id="habitDesc" placeholder="Детали (необязательно)">
            </div>
            <div class="form-group">
                <label for="habitColor">Цвет</label>
                <div style="display:flex;align-items:center;gap:12px">
                    <input type="color" id="habitColor" value="#4caf50" style="width:50px;height:36px;border:none;border-radius:6px;cursor:pointer">
                    <span id="colorPreview" style="font-family:monospace;color:var(--text-muted)">#4caf50</span>
                </div>
            </div>
            <p class="error-msg" id="addHabitError"></p>
            <button type="submit" class="btn-primary">Создать</button>
        </form>
    </div>
</div>

</body>
</html>
